<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Rizky Eka Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            .print-card { border: 1px solid #000; padding: 20px; width: 100%; }
        }

        .print-only { display: none; }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .modal-animate {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="app">
        <!-- Loading State -->
        <div id="loading-screen" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center no-print">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="loading-text" class="font-black italic text-indigo-900 tracking-widest uppercase text-xs animate-pulse text-center px-6">
                Menghubungkan Cloud...<br>
                <span class="text-[9px] font-normal normal-case opacity-60">Pastikan koneksi internet aktif</span>
            </p>
            <button onclick="useOfflineMode()" class="mt-8 text-xs font-bold text-slate-400 underline decoration-dotted">Buka Tanpa Cloud (Mode Demo)</button>
        </div>

        <!-- Header -->
        <header class="h-16 bg-white border-b sticky top-0 z-40 px-4 flex items-center justify-between no-print">
            <div class="flex items-center gap-2">
                <i data-lucide="wrench" class="text-indigo-600 w-6 h-6"></i>
                <h1 class="font-black italic text-lg tracking-tighter uppercase">RIZKY EKA</h1>
            </div>
            <div id="connection-badge" class="px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-[9px] font-black uppercase">Offline Mode</div>
        </header>

        <!-- Main Content -->
        <main class="p-4 md:p-8 max-w-5xl mx-auto pb-32 no-print">
            <!-- Statistik Section -->
            <section class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Omzet</p>
                    <p id="stat-revenue" class="text-lg font-black text-green-600">Rp 0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Piutang Kerja</p>
                    <p id="stat-pending" class="text-lg font-black text-amber-500">Rp 0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm col-span-2 md:col-span-1">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Antrean Aktif</p>
                    <p id="stat-count" class="text-lg font-black text-indigo-600">0 Pekerjaan</p>
                </div>
            </section>

            <!-- Nav Tabs -->
            <div class="flex gap-2 mb-6 bg-slate-200/50 p-1.5 rounded-2xl">
                <button onclick="switchTab('orders')" id="tab-orders" class="flex-1 py-3 rounded-xl text-xs font-black uppercase tracking-wider transition-all bg-white text-indigo-600 shadow-sm">Antrean</button>
                <button onclick="switchTab('rekap')" id="tab-rekap" class="flex-1 py-3 rounded-xl text-xs font-black uppercase tracking-wider transition-all text-slate-500">Log Aktivitas</button>
            </div>

            <!-- List Content -->
            <div id="content-orders" class="space-y-4"></div>
            <div id="content-rekap" class="hidden space-y-2"></div>

            <!-- Tombol Tambah -->
            <button onclick="openModal()" class="fixed bottom-24 right-6 w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-2xl shadow-indigo-300 flex items-center justify-center z-50 active:scale-90 transition-transform no-print">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </button>
        </main>

        <!-- Bottom Nav -->
        <nav class="fixed bottom-0 inset-x-0 bg-white border-t p-4 flex justify-around items-center no-print z-40 rounded-t-[2rem] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <button onclick="switchTab('orders')" class="flex flex-col items-center gap-1 group">
                <i data-lucide="clipboard-list" class="text-slate-300 group-hover:text-indigo-600 transition"></i>
                <span class="text-[9px] font-black uppercase text-slate-400">Kerja</span>
            </button>
            <div class="w-12 h-1"></div>
            <button onclick="switchTab('rekap')" class="flex flex-col items-center gap-1 group">
                <i data-lucide="history" class="text-slate-300 group-hover:text-indigo-600 transition"></i>
                <span class="text-[9px] font-black uppercase text-slate-400">Log</span>
            </button>
        </nav>

        <!-- Modal Form -->
        <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-end md:items-center justify-center p-4 no-print">
            <div class="bg-white w-full max-w-md rounded-t-[2.5rem] md:rounded-[2.5rem] overflow-hidden modal-animate">
                <div class="bg-indigo-700 p-8 text-white flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-black italic tracking-tighter uppercase">Order Baru</h2>
                    </div>
                    <button onclick="closeModal()" class="bg-white/10 p-2 rounded-full"><i data-lucide="x"></i></button>
                </div>
                <form id="order-form" class="p-8 space-y-4">
                    <input type="text" id="cust-name" placeholder="NAMA PELANGGAN" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 font-black uppercase text-sm outline-none focus:border-indigo-600">
                    <input type="number" id="cust-phone" placeholder="NOMOR WHATSAPP (08...)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 font-black text-sm outline-none focus:border-indigo-600">
                    <select id="service-type" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 font-bold text-sm outline-none focus:border-indigo-600 appearance-none">
                        <option>Cuci AC Standard</option>
                        <option>Cuci AC Inverter</option>
                        <option>Bongkar Pasang AC</option>
                        <option>Isi/Tambah Freon</option>
                        <option>Servis Mesin Cuci</option>
                        <option>Servis Kulkas</option>
                    </select>
                    <input type="number" id="service-price" placeholder="BIAYA (Rp)" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 font-black text-indigo-700 text-lg outline-none focus:border-indigo-600">
                    <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-indigo-100 active:scale-95 transition">Simpan Antrean</button>
                </form>
            </div>
        </div>

        <!-- Print Area -->
        <div id="print-area" class="print-only p-8 text-black bg-white">
            <!-- Content will be injected by JS -->
        </div>
    </div>

    <!-- basebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDWA-hwFpdf2MBylr1y3MnYXGv6U-CwYs",
    authDomain: "webku-1815e.firebaseapp.com",
    projectId: "webku-1815e",
    storageBucket: "webku-1815e.firebasestorage.app",
    messagingSenderId: "598947884980",
    appId: "1:598947884980:web:ef539b8427c831d93e8ce1",
    measurementId: "G-3RLHKWLRHW"
        };

        let db, auth, isCloudEnabled = false;
        const appId = 'rizky-eka-v1';
        let localData = JSON.parse(localStorage.getItem('re_orders') || '[]');
        let localLogs = JSON.parse(localStorage.getItem('re_logs') || '[]');

        const timeout = setTimeout(() => {
            if(!isCloudEnabled) useOfflineMode();
        }, 5000);

        async function initApp() {
            try {
                if (firebaseConfig.apiKey) {
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    await signInAnonymously(auth);
                    isCloudEnabled = true;
                    document.getElementById('connection-badge').innerText = "Cloud Online";
                    document.getElementById('connection-badge').className = "px-3 py-1 bg-green-100 text-green-700 rounded-full text-[9px] font-black uppercase";
                    loadCloudData();
                    clearTimeout(timeout);
                } else {
                    useOfflineMode();
                }
            } catch (e) {
                console.error("Firebase Error:", e);
                useOfflineMode();
            }
        }

        window.useOfflineMode = () => {
            isCloudEnabled = false;
            document.getElementById('loading-screen').classList.add('hidden');
            renderOrders(localData);
            renderLogs(localLogs);
            updateStats(localData);
            lucide.createIcons();
        };

        function loadCloudData() {
            const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
            onSnapshot(ordersRef, (snapshot) => {
                const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                data.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderOrders(data);
                updateStats(data);
                document.getElementById('loading-screen').classList.add('hidden');
            });

            const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
            onSnapshot(logsRef, (snapshot) => {
                const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                data.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderLogs(data);
            });
        }

        // --- ACTIONS ---

        const orderForm = document.getElementById('order-form');
        orderForm.onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const type = document.getElementById('service-type').value;
            const price = document.getElementById('service-price').value;

            const newData = {
                customer: name.toUpperCase(),
                phone: phone,
                type: type,
                total: price,
                status: 'Pending',
                createdAt: isCloudEnabled ? serverTimestamp() : { seconds: Date.now()/1000 }
            };

            if (isCloudEnabled) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), newData);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), { customer: name, action: 'INPUT BARU', timestamp: serverTimestamp() });
            } else {
                newData.id = 'LOCAL-' + Date.now();
                localData.unshift(newData);
                localLogs.unshift({ customer: name, action: 'INPUT LOCAL', timestamp: { seconds: Date.now()/1000 } });
                saveLocal();
                useOfflineMode();
            }
            orderForm.reset();
            window.closeModal();
        };

        window.markDone = async (id) => {
            if (isCloudEnabled) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id), { status: 'Completed' });
            } else {
                localData = localData.map(o => o.id === id ? {...o, status: 'Completed'} : o);
                saveLocal();
                useOfflineMode();
            }
        };

        window.deleteOrder = async (id) => {
            if (!confirm("Hapus pesanan ini?")) return;
            if (isCloudEnabled) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id));
            } else {
                localData = localData.filter(o => o.id !== id);
                saveLocal();
                useOfflineMode();
            }
        };

        // Fitur WhatsApp
        window.sendWA = (name, phone, type, total) => {
            if (!phone) return alert("Nomor HP tidak ada!");
            const msg = `Halo Bapak/Ibu ${name},\n\nTerima kasih telah menggunakan jasa *RIZKY EKA TEKNISI*.\n\nDetail Pekerjaan:\n🛠️ ${type}\n💰 Biaya: Rp ${Number(total).toLocaleString('id-ID')}\n✅ Status: Selesai\n\nGaransi pengerjaan 30 hari. Simpan pesan ini sebagai bukti.`;
            const url = `https://wa.me/${phone.startsWith('0') ? '62' + phone.slice(1) : phone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        };

        // Fitur Cetak
        window.printInvoice = (name, type, total) => {
            const date = new Date().toLocaleDateString('id-ID', { dateStyle: 'long' });
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = `
                <div style="border: 2px solid #000; padding: 30px; max-width: 500px; margin: auto;">
                    <h1 style="text-align: center; font-weight: 800; font-style: italic; margin-bottom: 5px;">RIZKY EKA TEKNISI</h1>
                    <p style="text-align: center; font-size: 10px; text-transform: uppercase; margin-bottom: 20px;">Spesialis AC & Mesin Cuci | 0812-xxxx-xxxx</p>
                    <hr style="border: 1px dashed #000;">
                    <div style="margin: 20px 0;">
                        <p><strong>Tanggal:</strong> ${date}</p>
                        <p><strong>Pelanggan:</strong> ${name}</p>
                    </div>
                    <hr style="border: 1px dashed #000;">
                    <div style="margin: 20px 0; display: flex; justify-content: space-between;">
                        <span>${type}</span>
                        <span>Rp ${Number(total).toLocaleString('id-ID')}</span>
                    </div>
                    <hr style="border: 1px dashed #000;">
                    <div style="margin: 20px 0; display: flex; justify-content: space-between; font-weight: 800; font-size: 20px;">
                        <span>TOTAL</span>
                        <span>Rp ${Number(total).toLocaleString('id-ID')}</span>
                    </div>
                    <p style="text-align: center; font-size: 12px; margin-top: 40px; font-style: italic;">"Terima kasih atas kepercayaan Anda!"</p>
                </div>
            `;
            window.print();
        };

        function saveLocal() {
            localStorage.setItem('re_orders', JSON.stringify(localData));
            localStorage.setItem('re_logs', JSON.stringify(localLogs));
        }

        // --- RENDERING ---

        function renderOrders(data) {
            const div = document.getElementById('content-orders');
            div.innerHTML = data.length === 0 ? '<p class="text-center py-10 text-slate-300 font-bold uppercase text-xs tracking-widest">Belum ada antrean</p>' : '';
            data.forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="font-black text-slate-800 uppercase text-sm tracking-tight">${o.customer}</h4>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${o.type}</p>
                        </div>
                        <p class="font-black text-indigo-600">Rp ${Number(o.total).toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="markDone('${o.id}')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition ${o.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}">
                            ${o.status === 'Completed' ? 'LUNAS' : 'SELESAIKAN'}
                        </button>
                        <button onclick="sendWA('${o.customer}', '${o.phone}', '${o.type}', '${o.total}')" class="p-3 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-600 hover:text-white transition">
                            <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                        <button onclick="printInvoice('${o.customer}', '${o.type}', '${o.total}')" class="p-3 bg-slate-50 text-slate-600 rounded-xl hover:bg-slate-800 hover:text-white transition">
                            <i data-lucide="printer" class="w-4 h-4"></i>
                        </button>
                        <button onclick="deleteOrder('${o.id}')" class="p-3 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                div.appendChild(card);
            });
            lucide.createIcons();
        }

        function renderLogs(data) {
            const div = document.getElementById('content-rekap');
            div.innerHTML = '';
            if(data.length === 0) div.innerHTML = '<p class="text-center py-10 text-slate-300 font-bold uppercase text-xs">Log kosong</p>';
            data.forEach(l => {
                div.innerHTML += `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center text-[10px] font-bold uppercase tracking-tighter">
                    <span class="text-slate-400">${new Date(l.timestamp?.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    <span class="text-slate-800">${l.customer}</span>
                    <span class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded">${l.action}</span>
                </div>`;
            });
        }

        function updateStats(data) {
            const total = data.filter(o => o
