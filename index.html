<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rizky Eka Teknisi - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDK (Versi Stabil untuk Anti-Hilang) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 pb-28">

    <header class="bg-indigo-700 text-white p-6 shadow-lg sticky top-0 z-40 no-print">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div>
                <h1 class="text-xl font-bold italic tracking-tighter uppercase">RIZKY EKA</h1>
                <p id="status-cloud" class="text-[10px] text-green-300 font-bold uppercase tracking-widest animate-pulse">Menghubungkan Cloud...</p>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold border border-white/30">RE</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 no-print">
        <!-- Dashboard Utama -->
        <div id="tab-orders" class="space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-black text-slate-700 uppercase">Antrean Kerja</h2>
                <span id="order-count" class="bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-full font-bold">0 Antrean</span>
            </div>
            <div id="order-list" class="space-y-3">
                <!-- Data akan dimuat di sini -->
            </div>
        </div>

        <!-- Rekapan Pendapatan -->
        <div id="tab-stats" class="hidden space-y-6">
            <h2 class="text-lg font-black text-slate-700 uppercase">Rekapitulasi</h2>
            <div class="bg-white p-6 rounded-3xl border shadow-sm flex items-center gap-5">
                <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-wallet"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Total Pendapatan</p>
                    <h3 id="stat-income" class="text-2xl font-black text-slate-800">Rp 0</h3>
                </div>
            </div>
            <div id="stat-breakdown" class="bg-white rounded-3xl border shadow-sm divide-y"></div>
        </div>
    </main>

    <!-- Navigasi Bawah -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-50 no-print rounded-t-3xl shadow-lg">
        <button onclick="showTab('orders')" id="nav-orders" class="flex flex-col items-center gap-1 text-indigo-600 border-b-2 border-indigo-600 pb-1">
            <i class="fas fa-tools"></i>
            <span class="text-[9px] font-bold uppercase">Kerja</span>
        </button>
        <button onclick="showTab('stats')" id="nav-stats" class="flex flex-col items-center gap-1 text-slate-300">
            <i class="fas fa-chart-pie"></i>
            <span class="text-[9px] font-bold uppercase">Rekap</span>
        </button>
    </nav>

    <!-- Tombol Tambah -->
    <button onclick="toggleModal(true)" class="fixed bottom-28 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-50 no-print border-4 border-white active:scale-90 transition">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Form Input Modal -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-[60] p-6 no-print">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden p-8 space-y-4">
            <h3 class="font-black text-xl uppercase italic text-indigo-700">Input Servis</h3>
            <input id="form-nama" type="text" class="w-full border-2 rounded-2xl px-5 py-4 font-bold border-slate-100" placeholder="Nama Pelanggan">
            <select id="form-layanan" class="w-full border-2 rounded-2xl px-5 py-4 font-bold bg-white border-slate-100">
                <option>Cuci AC Standard</option>
                <option>Cuci AC Inverter</option>
                <option>Isi Freon</option>
                <option>Servis Mesin Cuci</option>
            </select>
            <input id="form-biaya" type="number" class="w-full border-2 rounded-2xl px-5 py-4 font-bold border-slate-100" placeholder="Biaya (Rp)">
            <button onclick="simpanData()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] uppercase">Simpan ke Cloud</button>
            <button onclick="toggleModal(false)" class="w-full text-slate-400 font-bold py-2 text-sm uppercase">Batal</button>
        </div>
    </div>

    <script>
        // Konfigurasi Cloud Database (Firebase)
        const firebaseConfig = {
            apiKey: "", 
            authDomain: "rizky-eka-service.firebaseapp.com",
            projectId: "rizky-eka-service",
            storageBucket: "rizky-eka-service.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        
        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Path Data Bapak (Unik)
        const appId = "rizky-eka-vFinal";
        const ordersRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders');

        // Fungsi Memuat Data (Realtime - Jika ada perubahan di HP lain, ini ikut berubah)
        function loadData() {
            ordersRef.orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                document.getElementById('status-cloud').innerText = "DATABASE CLOUD TERKONEKSI";
                document.getElementById('status-cloud').classList.remove('animate-pulse');
                
                const list = document.getElementById('order-list');
                const count = document.getElementById('order-count');
                let income = 0; let html = ""; let cAntrean = 0; let bdown = {};

                snapshot.forEach((doc) => {
                    const d = doc.data();
                    if(d.status === 'Selesai') { 
                        income += d.total; 
                        bdown[d.type] = (bdown[d.type] || 0) + 1;
                    } else { cAntrean++; }

                    html += `
                        <div class="bg-white p-5 rounded-3xl border shadow-sm transition-all ${d.status === 'Selesai' ? 'opacity-60 bg-slate-50' : 'border-indigo-100'}">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-black text-slate-800 text-lg">${d.customer}</h3>
                                    <p class="text-[10px] text-indigo-500 font-black uppercase">${d.type}</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-black text-indigo-700">Rp ${d.total.toLocaleString()}</p>
                                    <span class="text-[8px] px-2 py-0.5 rounded font-black uppercase ${d.status === 'Selesai' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${d.status}</span>
                                </div>
                            </div>
                            <div class="flex gap-2 mt-5">
                                ${d.status !== 'Selesai' ? `<button onclick="selesaikan('${doc.id}')" class="bg-emerald-600 text-white px-4 py-3 rounded-xl text-[10px] font-black uppercase flex-1 shadow-lg active:scale-95 transition">Selesai</button>` : ''}
                                <button onclick="hapusData('${doc.id}')" class="text-rose-300 p-2"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html || '<p class="text-center py-20 text-slate-400">Belum ada job masuk.</p>';
                count.innerText = cAntrean + " Antrean";
                document.getElementById('stat-income').innerText = "Rp " + income.toLocaleString();
                
                let bHtml = "";
                for(let k in bdown) bHtml += `<div class="p-4 flex justify-between"><span>${k}</span><span class="font-black">${bdown[k]}x</span></div>`;
                document.getElementById('stat-breakdown').innerHTML = bHtml || '<p class="p-4 text-center text-slate-400 text-xs italic">Belum ada pendapatan.</p>';
            }, (error) => {
                document.getElementById('status-cloud').innerText = "KONEKSI BERMASALAH!";
                document.getElementById('status-cloud').classList.add('text-rose-500');
            });
        }

        function simpanData() {
            const n = document.getElementById('form-nama').value;
            const l = document.getElementById('form-layanan').value;
            const b = document.getElementById('form-biaya').value;
            if(!n || !b) return alert("Lengkapi data!"); 
            
            ordersRef.add({ 
                customer: n, 
                type: l, 
                total: parseInt(b), 
                status: 'Proses', 
                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            }).then(() => {
                toggleModal(false);
                document.getElementById('form-nama').value = ""; 
                document.getElementById('form-biaya').value = "";
            });
        }

        function selesaikan(id) { 
            ordersRef.doc(id).update({ status: 'Selesai' }); 
        }

        function hapusData(id) { 
            if(confirm("Hapus data ini selamanya dari Cloud?")) ordersRef.doc(id).delete(); 
        }

        function showTab(t) {
            ['orders', 'stats'].forEach(i => {
                document.getElementById('tab-'+i).classList.toggle('hidden', i !== t);
                document.getElementById('nav-'+i).classList.toggle('text-indigo-600', i === t);
                document.getElementById('nav-'+i).classList.toggle('border-b-2', i === t);
                document.getElementById('nav-'+i).classList.toggle('border-indigo-600', i === t);
                document.getElementById('nav-'+i).classList.toggle('text-slate-300', i !== t);
            });
        }

        function toggleModal(s) { document.getElementById('modal').classList.toggle('hidden', !s); }

        // PENTING: Jalankan saat halaman dibuka
        window.onload = loadData;
    </script>
</body>
</html>
