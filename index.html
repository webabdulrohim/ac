<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Rizky Eka Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* CSS Khusus Cetak */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            #print-area { width: 100%; border: none; }
        }
        .print-only { display: none; }
        
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="app">
        <!-- Layar Loading / Setup -->
        <div id="loading-screen" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center no-print text-center px-10">
            <div id="loader-icon" class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <div id="setup-message" class="hidden">
                <i data-lucide="cloud-off" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
                <h3 class="font-black text-slate-800 uppercase tracking-tight">Cloud Belum Siap</h3>
                <p class="text-xs text-slate-500 mt-2 mb-6">Bapak belum memasukkan <b>Firebase Config</b>. Gunakan mode offline untuk sementara.</p>
            </div>
            <p id="loading-text" class="font-black italic text-indigo-900 tracking-widest uppercase text-xs animate-pulse">
                Menghubungkan Cloud...
            </p>
            <div class="flex flex-col gap-3 mt-8">
                <button onclick="useOfflineMode()" class="px-6 py-3 bg-slate-100 text-slate-600 rounded-2xl text-xs font-bold uppercase tracking-widest">Gunakan Mode Offline</button>
            </div>
        </div>

        <!-- Header -->
        <header class="h-16 bg-white border-b sticky top-0 z-40 px-4 flex items-center justify-between no-print">
            <div class="flex items-center gap-2">
                <i data-lucide="wrench" class="text-indigo-600 w-6 h-6"></i>
                <h1 class="font-black italic text-lg tracking-tighter uppercase">RIZKY EKA</h1>
            </div>
            <div id="conn-status" class="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[9px] font-black uppercase tracking-tighter">Mode Offline</div>
        </header>

        <!-- Statistik Utama -->
        <main class="p-4 md:p-8 max-w-5xl mx-auto pb-32 no-print">
            <section class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Omzet</p>
                    <p id="stat-revenue" class="text-lg font-black text-green-600">Rp 0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Piutang Kerja</p>
                    <p id="stat-pending" class="text-lg font-black text-amber-500">Rp 0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm col-span-2 md:col-span-1 text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Antrean Aktif</p>
                    <p id="stat-count" class="text-lg font-black text-indigo-600">0 Order</p>
                </div>
            </section>

            <!-- Container Antrean -->
            <div id="content-orders" class="space-y-4"></div>

            <!-- Tombol Tambah Pesanan -->
            <button onclick="openModal()" class="fixed bottom-24 right-6 w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-2xl flex items-center justify-center z-50 active:scale-90 transition-transform no-print">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </button>
        </main>

        <!-- Navigasi Bawah -->
        <nav class="fixed bottom-0 inset-x-0 bg-white border-t p-4 flex justify-around items-center no-print z-40 rounded-t-[2rem] shadow-lg">
            <button onclick="location.reload()" class="flex flex-col items-center gap-1">
                <i data-lucide="refresh-cw" class="text-slate-300 w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase text-slate-400">Refresh</span>
            </button>
            <div class="w-12"></div>
            <button onclick="alert('Fitur ini akan segera hadir')" class="flex flex-col items-center gap-1">
                <i data-lucide="history" class="text-slate-300 w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase text-slate-400">Log</span>
            </button>
        </nav>

        <!-- Modal Tambah Order -->
        <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-end md:items-center justify-center p-4 no-print">
            <div class="bg-white w-full max-w-md rounded-t-[2.5rem] md:rounded-[2.5rem] overflow-hidden modal-animate">
                <div class="bg-indigo-700 p-8 text-white flex justify-between items-center">
                    <h2 class="text-xl font-black italic tracking-tighter uppercase">Order Baru</h2>
                    <button onclick="closeModal()" class="bg-white/10 p-2 rounded-full"><i data-lucide="x"></i></button>
                </div>
                <form id="order-form" class="p-8 space-y-4">
                    <input type="text" id="cust-name" placeholder="NAMA PELANGGAN" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 font-black uppercase text-sm outline-none focus:border-indigo-600">
                    <input type="number" id="cust-phone" placeholder="NO WHATSAPP (08...)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 font-black text-sm outline-none focus:border-indigo-600">
                    <select id="service-type" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 font-bold text-sm outline-none focus:border-indigo-600 appearance-none">
                        <option>Cuci AC Standard</option>
                        <option>Cuci AC Inverter</option>
                        <option>Bongkar Pasang AC</option>
                        <option>Isi Freon</option>
                        <option>Servis Mesin Cuci</option>
                        <option>Servis Kulkas</option>
                    </select>
                    <input type="number" id="service-price" placeholder="BIAYA (Rp)" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 font-black text-indigo-700 text-lg outline-none focus:border-indigo-600">
                    <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition">Simpan Antrean</button>
                </form>
            </div>
        </div>

        <!-- Area Struk Cetak (Hanya muncul saat diprint) -->
        <div id="print-area" class="print-only p-10 bg-white text-black border">
            <!-- Isi diisi oleh JavaScript -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // GANTI INI JIKA SUDAH ADA KODE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDDWA-hwFpdf2MBylr1y3MnYXGv6U-CwYs",
    authDomain: "webku-1815e.firebaseapp.com",
    projectId: "webku-1815e",
    storageBucket: "webku-1815e.firebasestorage.app",
    messagingSenderId: "598947884980",
    appId: "1:598947884980:web:ee8cede1c825b2553e8ce1",
    measurementId: "G-F6LYVJ7JRN"
        };

        let db, isCloud = false;
        let localData = JSON.parse(localStorage.getItem('re_orders_local') || '[]');

        // Inisialisasi Aplikasi
        if (firebaseConfig.apiKey) {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                const auth = getAuth(app);
                signInAnonymously(auth).then(() => {
                    isCloud = true;
                    document.getElementById('conn-status').innerText = "Cloud Online";
                    document.getElementById('conn-status').className = "px-3 py-1 bg-green-100 text-green-700 rounded-full text-[9px] font-black uppercase";
                    loadCloud();
                });
            } catch (e) { useOfflineMode(); }
        } else {
            setTimeout(() => {
                document.getElementById('loader-icon').classList.add('hidden');
                document.getElementById('loading-text').classList.add('hidden');
                document.getElementById('setup-message').classList.remove('hidden');
                lucide.createIcons();
            }, 1500);
        }

        window.useOfflineMode = () => {
            document.getElementById('loading-screen').classList.add('hidden');
            renderOrders(localData);
            updateStats(localData);
        };

        function loadCloud() {
            onSnapshot(collection(db, 'artifacts', 'rizky-eka', 'public', 'data', 'orders'), (snap) => {
                const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderOrders(data);
                updateStats(data);
                document.getElementById('loading-screen').classList.add('hidden');
            });
        }

        window.openModal = () => document.getElementById('modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        // Simpan Data Baru
        document.getElementById('order-form').onsubmit = async (e) => {
            e.preventDefault();
            const order = {
                customer: document.getElementById('cust-name').value.toUpperCase(),
                phone: document.getElementById('cust-phone').value,
                type: document.getElementById('service-type').value,
                total: document.getElementById('service-price').value,
                status: 'Pending',
                createdAt: isCloud ? serverTimestamp() : Date.now()
            };

            if (isCloud) {
                await addDoc(collection(db, 'artifacts', 'rizky-eka', 'public', 'data', 'orders'), order);
            } else {
                order.id = 'ID-' + Date.now();
                localData.unshift(order);
                localStorage.setItem('re_orders_local', JSON.stringify(localData));
                renderOrders(localData);
                updateStats(localData);
            }
            document.getElementById('order-form').reset();
            closeModal();
        };

        // Update Status Lunas
        window.markDone = async (id) => {
            if (isCloud) {
                await updateDoc(doc(db, 'artifacts', 'rizky-eka', 'public', 'data', 'orders', id), { status: 'Completed' });
            } else {
                localData = localData.map(o => o.id === id ? {...o, status: 'Completed'} : o);
                localStorage.setItem('re_orders_local', JSON.stringify(localData));
                renderOrders(localData);
                updateStats(localData);
            }
        };

        // Fungsi WhatsApp
        window.sendWA = (name, phone, type, total) => {
            if(!phone) return alert("No HP pelanggan belum diisi!");
            const msg = `Halo Bapak/Ibu ${name},\n\nTerima kasih telah menggunakan jasa *RIZKY EKA TEKNISI*.\n\nPekerjaan: ${type}\nTotal Biaya: Rp ${Number(total).toLocaleString('id-ID')}\nStatus: SELESAI\n\nSemoga awet ya Pak/Bu! Simpan nomor kami untuk servis berikutnya.`;
            const waPhone = phone.startsWith('0') ? '62' + phone.slice(1) : phone;
            window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(msg)}`);
        };

        // Fungsi Cetak Struk
        window.printOrder = (name, type, total) => {
            const date = new Date().toLocaleDateString('id-ID', { dateStyle: 'long' });
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = `
                <div style="text-align: center; border: 2px solid #000; padding: 20px; max-width: 400px; margin: auto;">
                    <h2 style="margin: 0; font-style: italic;">RIZKY EKA TEKNISI</h2>
                    <p style="font-size: 10px; margin-bottom: 20px;">Servis AC & Peralatan Rumah Tangga</p>
                    <hr style="border: 1px dashed #000;">
                    <div style="text-align: left; margin: 15px 0; font-size: 14px;">
                        <p>Tgl: ${date}</p>
                        <p>Nama: ${name}</p>
                        <p>Pekerjaan: ${type}</p>
                    </div>
                    <hr style="border: 1px dashed #000;">
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin: 15px 0;">
                        <span>TOTAL</span>
                        <span>Rp ${Number(total).toLocaleString('id-ID')}</span>
                    </div>
                    <p style="font-size: 12px; margin-top: 30px;">Terima Kasih Atas Kepercayaannya!</p>
                </div>
            `;
            window.print();
        };

        // Render Kartu Pesanan
        function renderOrders(data) {
            const div = document.getElementById('content-orders');
            div.innerHTML = data.length === 0 ? '<p class="text-center py-10 text-slate-300 font-bold uppercase text-xs">Belum ada antrean</p>' : '';
            
            data.sort((a,b) => {
                const timeA = a.createdAt?.seconds ? a.createdAt.seconds : a.createdAt;
                const timeB = b.createdAt?.seconds ? b.createdAt.seconds : b.createdAt;
                return timeB - timeA;
            }).forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="font-black text-slate-800 text-sm uppercase">${o.customer}</h4>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${o.type}</p>
                        </div>
                        <p class="font-black text-indigo-600">Rp ${Number(o.total).toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="markDone('${o.id}')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition ${o.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}">
                            ${o.status === 'Completed' ? 'LUNAS' : 'SELESAIKAN'}
                        </button>
                        <!-- TOMBOL WHATSAPP -->
                        <button onclick="sendWA('${o.customer}', '${o.phone}', '${o.type}', '${o.total}')" class="p-3 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-600 hover:text-white transition">
                            <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                        <!-- TOMBOL CETAK -->
                        <button onclick="printOrder('${o.customer}', '${o.type}', '${o.total}')" class="p-3 bg-slate-50 text-slate-600 rounded-xl hover:bg-slate-800 hover:text-white transition">
                            <i data-lucide="printer" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                div.appendChild(card);
            });
            lucide.createIcons();
        }

        function updateStats(data) {
            const total = data.filter(o => o.status === 'Completed').reduce((s, o) => s + Number(o.total), 0);
            const pending = data.filter(o => o.status !== 'Completed').reduce((s, o) => s + Number(o.total), 0);
            document.getElementById('stat-revenue').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('stat-pending').innerText = `Rp ${pending.toLocaleString('id-ID')}`;
            document.getElementById('stat-count').innerText = `${data.filter(o => o.status !== 'Completed').length} Order`;
        }

        lucide.createIcons();
    </script>
</body>
</html>
